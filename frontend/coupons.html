<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all verified coupons and discount codes. Search, filter by category, and save.">
  <meta property="og:title" content="All Coupons — CouponHub">
  <meta property="og:description" content="Browse all verified coupons and discount codes.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hellenicdev.github.io/qoupon/coupons.html">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="All Coupons — CouponHub">
  <meta name="twitter:description" content="Browse all verified coupons and discount codes.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a7c7a'/><text x='16' y='22' font-size='18' font-weight='bold' fill='white' text-anchor='middle' font-family='sans-serif'>C</text></svg>">
  <title>All Coupons — CouponHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="ad-block ad-leaderboard" style="margin-top:0;">Ad — Leaderboard 728×90</div>

<header class="header">
  <div class="container header-inner">
    <a href="./" class="logo">Coupon<span>Hub</span></a>
    <nav class="nav">
      <a href="./">Home</a>
      <a href="coupons.html" class="active">All Coupons</a>
      <a href="submit.html">Submit Coupon</a>
    </nav>
  </div>
</header>

<section class="section">
  <div class="container">
    <h1 class="section-title">All Coupons</h1>

    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;">
      <input type="text" id="searchInput" placeholder="Search..." style="flex:1;padding:12px 14px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:0.95rem;">
      <select id="sortSelect" style="padding:12px 14px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:0.95rem;">
        <option value="-createdAt">Newest</option>
        <option value="store">Store A-Z</option>
        <option value="-clicks">Most Used</option>
      </select>
    </div>

    <div id="categoryFilter" class="category-filter"></div>
    <div class="ad-block ad-native">Ad — In-Feed Native</div>
    <div id="couponGrid" class="coupon-grid"></div>
    <div id="pagination" class="pagination"></div>
  </div>
</section>

<div class="ad-block ad-leaderboard">Ad — Leaderboard 728×90</div>
<div class="ad-block ad-sticky">Ad — Sticky Footer Ad</div>

<div id="interstitial" class="interstitial-overlay">
  <div class="interstitial-box">
    <button class="interstitial-close" onclick="closeInterstitial()">&times;</button>
    <p style="font-weight:700;margin-bottom:8px;">Before you go...</p>
    <div class="ad-block" style="width:300px;height:250px;margin:16px auto;">Ad — Interstitial 300×250</div>
    <button class="btn btn-primary btn-sm" onclick="closeInterstitial()">Continue</button>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <p>&copy; 2026 CouponHub. Made by <a href="https://github.com/hellenicdev" style="color:var(--gray-400)">hellenicdev</a> &amp; <a href="https://github.com/4klgtv" style="color:var(--gray-400)">4klgtv</a>. All deals are for informational purposes.</p>
  </div>
</footer>

<script>
  window.API_BASE = 'https://qoupon.onrender.com/api';
</script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  let currentPage = 1;
  let currentCat = '';
  let currentSearch = new URLSearchParams(location.search).get('search') || '';

  if (currentSearch) document.getElementById('searchInput').value = currentSearch;

  async function load() {
    const data = await loadCoupons('couponGrid', {
      category: currentCat,
      search: currentSearch,
      page: currentPage,
      limit: 20
    });
    if (!data) return;
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    if (data.page > 1) {
      pg.innerHTML += `<button onclick="currentPage--;load()">Prev</button>`;
    }
    pg.innerHTML += `<span style="padding:8px 12px;color:var(--gray-500)">Page ${data.page} of ${data.pages}</span>`;
    if (data.page < data.pages) {
      pg.innerHTML += `<button onclick="currentPage++;load()">Next</button>`;
    }
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value;
    currentPage = 1;
    load();
  });

  loadCategories('categoryFilter', cat => {
    currentCat = cat;
    currentPage = 1;
    load();
  });

  load();
</script>
</body>
</html>
