<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verified free coupons and discount codes from top stores. Save money daily — 100% free.">
  <meta name="keywords" content="coupons, discount codes, deals, free coupons, promo codes, savings">
  <meta property="og:title" content="QOUPON — Save Money Today">
  <meta property="og:description" content="Verified free coupons and discount codes from top stores.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hellenicdev.github.io/qoupon/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="QOUPON — Save Money Today">
  <meta name="twitter:description" content="Verified free coupons and discount codes from top stores.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a7c7a'/><text x='16' y='22' font-size='18' font-weight='bold' fill='white' text-anchor='middle' font-family='sans-serif'>Q</text></svg>">
  <title>QOUPON — Save Money Today</title>
  <link rel="stylesheet" href="css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3397687972291958" crossorigin="anonymous"></script>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="./" class="logo">QOUPON</a>
    <nav class="nav">
      <a href="./" class="active">Home</a>
      <a href="coupons.html">All Coupons</a>
      <a href="submit.html">Submit Coupon</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Save Big with Verified Coupons</h1>
    <p>Hand-picked discounts from top stores. Updated daily. 100% free.</p>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search stores or coupons..." onkeydown="if(event.key==='Enter') window.location.href='coupons.html?search='+encodeURIComponent(this.value)">
      <button onclick="window.location.href='coupons.html?search='+encodeURIComponent(document.getElementById('searchInput').value)">Search</button>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <h2 class="section-title">Featured Coupons</h2>
    <div id="categoryFilter" class="category-filter"></div>
    <div id="couponGrid" class="coupon-grid"></div>
  </div>
</section>

<div id="interstitial" class="interstitial-overlay">
  <div class="interstitial-box">
    <button class="interstitial-close" onclick="closeInterstitial()">&times;</button>
    <p style="font-weight:700;margin-bottom:16px;">Before you go...</p>
    <button class="btn btn-primary" onclick="closeInterstitial()">Continue</button>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <p>&copy; 2026 QOUPON. Made by <a href="https://github.com/hellenicdev" style="color:var(--gray-400)">hellenicdev</a> &amp; <a href="https://github.com/4klgtv" style="color:var(--gray-400)">4klgtv</a>. All deals are for informational purposes.</p>
  </div>
</footer>

<script>
  window.API_BASE = 'https://qoupons-github-io.onrender.com/api';
</script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  loadCategories('categoryFilter', cat => loadCoupons('couponGrid', { category: cat }));
  loadCoupons('couponGrid', { limit: 12 });
</script>
</body>
</html>
